<!DOCTYPE html>
<html>
<head>
<title>TSU Library Login</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0a4b8f, #1e90ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.login-box {
  background: white;
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  color: #0a4b8f;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  background: #0a4b8f;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1e90ff;
}

.link {
  text-align: center;
  margin-top: 10px;
}

.link a {
  color: #0a4b8f;
  text-decoration: none;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>TSU Library Login</h2>

  <input type="email" id="email" placeholder="Email Address" required>
  <input type="password" id="password" placeholder="Password" required>

  <button onclick="login()">Login</button>

  <div class="link">
    <a href="#">Forgot Password?</a><br><br>
    <a href="#">New Student? Sign Up</a>
  </div>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email == "" || password == "") {
    alert("Please fill all fields");
  } else {
    alert("Login Successful! Welcome to TSU Library");
    // Redirect to dashboard (future page)
    // window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
