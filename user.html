<!DOCTYPE html>
<html>
<head>
<title>TSU Library Login</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0a4b8f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  color: #0a4b8f;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #0a4b8f;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #083b70;
}

p {
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>TSU Library Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  // MAIN LOGIN DETAILS
  let mainEmail = "tsustudent@gmail.com";
  let mainPassword = "password123";

  if (email === mainEmail && password === mainPassword) {
    alert("Login Successful!");
    window.location.href = "dashboard.html"; // open dashboard
  } else {
    document.getElementById("msg").innerHTML = "❌ Invalid Email or Password";
  }
}
</script>

</body>
</html>
